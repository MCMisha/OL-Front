<section class="premieres">
  <div class="premieres__head">
    <div class="premieres__title">_NASZE NAJNOWSZE PREMIERY</div>
    <a class="premieres__link" href="#" aria-label="Przejdź do spektakli">SPEKTAKLE</a>
  </div>

  <div class="premieres__grid">
    <article class="pCard" *ngFor="let p of items">
      <div class="pCard__media" [style.backgroundImage]="'url(' + p.imageUrl + ')'"></div>

      <div class="pCard__body">
        <div class="pCard__meta">
          <span class="pCard__cat">{{ p.category }}</span>
        </div>

        <div class="pCard__row">
          <div class="pCard__name">{{ p.title }}</div>

          <div class="pCard__prem">
            <div class="pCard__premLabel">{{ p.labelLeft }}</div>
            <div class="pCard__premDate">{{ p.date }}</div>
          </div>
        </div>

        <a class="pCard__btn" [href]="p.moreUrl || '#'" target="_blank" rel="noreferrer">
          CZYTAJ WIĘCEJ
        </a>
      </div>
    </article>
  </div>
</section>
