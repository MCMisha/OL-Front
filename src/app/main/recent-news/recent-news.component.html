<section class="newsStrip">
  <header class="newsStrip__header">
    <h2 class="newsStrip__title">{{ headerTitle }}</h2>
  </header>

  <div class="newsStrip__grid">
    <article class="newsCard" *ngFor="let n of items; let i = index">
      <div class="newsCard__content">
        <div class="newsCard__date">{{ formatDatePl(n.creationDate) }}</div>
        <div class="newsCard__heading">{{ n.title }}</div>
        <p class="newsCard__text" [innerHTML]="truncate(n.content)"></p>
        <a class="newsCard__cta" [routerLink]="'news/'+n.id">Czytaj więcej</a>
      </div>
    </article>
  </div>

  <div class="newsStrip__footer">
    <a class="newsStrip__more" [routerLink]="moreLink">Aktualności</a>
  </div>
</section>
