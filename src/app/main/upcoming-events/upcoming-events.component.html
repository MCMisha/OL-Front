<section class="upcoming">
  <div class="header">
    <div class="upcoming__title">_NAJBLIŻSZE WYDARZENIA</div>
    <a class="navLink" routerLink="/performances">
      Przejdź do repertuaru
    </a>
  </div>


  <div class="upcoming__wrap">
    <div #viewport class="viewport drag-viewport" (pointerdown)="onPointerDown($event)"
         (pointermove)="onPointerMove($event)"
         (pointerup)="onPointerUp()"
         (pointercancel)="onPointerUp()"
         (pointerleave)="onPointerUp()">
      <div class="track drag-track">
        <article
          class="card text-white"
          *ngFor="let e of events"
          [style.--bg]="e.imageUrl ? 'url(' + e.imageUrl + ')' : 'none'"
          (click)="onCardClick($event)"
        >
          <div class="card__content">
            <div class="card__top">
              <div class="date">
                <div class="date__day">{{ e.startAt | date:'d' }}</div>

                <div class="date__meta">
                  <div class="date__month">{{ e.startAt | date:'MMMM':'':'pl' | uppercase }}</div>

                  <div class="date__weekday">{{ e.startAt | date:'EEEE':'':'pl' }}</div>
                </div>
              </div>

              <div class="meta">
                <div class="meta__time">{{ e.startAt | date:'HH:mm' }}</div>
                <div class="meta__place">{{ e.place }}</div>
              </div>
            </div>

            <div class="card__mid">
              <div class="tag">{{ e.genre }}</div>
              <div class="name">{{ e.title }}</div>
            </div>

            <div class="card__bottom">

              <a class="btn btn--solid" *ngIf="helperFunctions.isSelling(e)" [href]="e.buyLink" target="_blank" rel="noreferrer">KUP BILET</a>
              <a class="btn btn--link" routerLink="performances/details/{{e.performanceId}}">Czytaj więcej</a>
            </div>
          </div>
        </article>

      </div>
    </div>
    <div class="navBlock">
      <div class="nav">
        <button class="nav__btn nav__btn--prev" type="button" (click)="scroll('prev')" aria-label="Poprzednie"></button>
        <button class="nav__btn nav__btn--next" type="button" (click)="scroll('next')" aria-label="Następne"></button>
      </div>
    </div>
  </div>
</section>
