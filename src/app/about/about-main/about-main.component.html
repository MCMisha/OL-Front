<section class="about-page">
  <button class="mobile-menu-button" (click)="openMobileNav()">
    ☰ Menu
  </button>

  <div
    class="mobile-sidenav-backdrop"
    *ngIf="isMobileNavOpen"
    (click)="closeMobileNav()">
  </div>

  <nav class="mobile-sidenav" [class.open]="isMobileNavOpen">
    <button class="mobile-sidenav__close" (click)="closeMobileNav()">
      &times;
    </button>

    <button
      class="mobile-sidenav__item"
      *ngFor="let section of aboutSections"
      [class.active]="selectedSection?.id === section.id"
      (click)="selectSection(section); closeMobileNav()">
      {{ section.title }}
    </button>
  </nav>
  <div class="about-page__inner">

    <aside class="about-sidebar">
      <div class="about-sidebar__label"><a routerLink="..">wróc</a></div>

      <button
        class="artists-sidebar__item"
        *ngFor="let section of aboutSections"
        [class.active]="selectedSection === section?.title"
        (click)="selectSection(section)">
        _{{ section.title }}
      </button>
    </aside>

    <main class="about-content">
      <div *ngIf="!isLoading && mainSectionDetails !== null" class="about-details">

        <h1>{{ mainSectionDetails.title }}</h1>

        <div [innerHTML]="mainSectionDetails.contentHtml"></div>
      </div>
    </main>

  </div>
</section>
