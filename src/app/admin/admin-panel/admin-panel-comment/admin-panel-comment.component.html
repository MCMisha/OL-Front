<mat-progress-bar class="mb-1" *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>
<div class="row mb-1 d-flex align-items-center">
  <div class="col-auto">
    <button mat-flat-button color="primary" routerLink="new" class="me-2">Dodaj</button>
  </div>
  <div class="col-auto">
    <button mat-flat-button color="accent" routerLink="{{selectedRow?.id}}/edit" [disabled]="!selectedRow" class="me-2">Edytuj</button>
  </div>
  <div class="col-auto">
    <button mat-flat-button color="warn" (click)="openDialog()" [disabled]="!selectedRow">Usuń</button>
  </div>
</div>

<table mat-table [dataSource]="dataSourceWithPageSize" class="mat-elevation-z8 pe-2">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>Id</th>
    <td mat-cell *matCellDef="let element">{{ element.id }}</td>
  </ng-container>

  <ng-container matColumnDef="firstName">
    <th mat-header-cell *matHeaderCellDef>Imię</th>
    <td mat-cell *matCellDef="let element">{{ element.firstName }}</td>
  </ng-container>

  <ng-container matColumnDef="stars">
    <th mat-header-cell *matHeaderCellDef>Ocena</th>
    <td mat-cell *matCellDef="let element">{{ element.stars }}</td>
  </ng-container>

  <ng-container matColumnDef="performanceId">
    <th mat-header-cell *matHeaderCellDef>Performance Id</th>
    <td mat-cell *matCellDef="let element">{{ element.performanceId }}</td>
  </ng-container>

  <ng-container matColumnDef="isShowing">
    <th mat-header-cell *matHeaderCellDef>Widoczny</th>
    <td mat-cell *matCellDef="let element">{{ element.isShowing ? 'Tak' : 'Nie' }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns;"
    (click)="highlightRow(row)"
    [ngClass]="{'highlighted': selectedRowIndex == row.id}">
  </tr>
</table>

<mat-paginator [pageSize]="pageSize" [pageIndex]="pageIndex" [pageSizeOptions]="[2, 5, 10]"></mat-paginator>
