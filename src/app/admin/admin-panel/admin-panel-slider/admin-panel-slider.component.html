<mat-progress-bar class="mb-1" *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>

<div class="row mb-1 d-flex align-items-center">
  <div class="col-auto">
    <button mat-flat-button color="primary" routerLink="new" class="me-2">Dodaj</button>
  </div>
  <div class="col-auto">
    <button mat-flat-button color="accent" routerLink="{{selectedRow?.id}}/edit" [disabled]="!selectedRow" class="me-2">
      Edytuj
    </button>
  </div>
  <div class="col-auto">
    <button mat-flat-button color="warn" (click)="openDialog()" [disabled]="!selectedRow">Usuń</button>
  </div>
</div>
<table mat-table [dataSource]="dataSourceWithPageSize" class="mat-elevation-z8 pe-2">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>Id</th>
    <td mat-cell *matCellDef="let element">{{ element.id }}</td>
  </ng-container>

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>Nazwa</th>
    <td mat-cell *matCellDef="let element">{{ element.title }}</td>
  </ng-container>

  <ng-container matColumnDef="isActive">
    <th mat-header-cell *matHeaderCellDef>Aktywny</th>
    <td mat-cell *matCellDef="let element">{{ element.isActive ? 'Tak' : 'Nie' }}</td>
  </ng-container>

  <ng-container matColumnDef="displayOrder">
    <th mat-header-cell *matHeaderCellDef>Kolejność</th>
    <td mat-cell *matCellDef="let element">{{ element.displayOrder }}</td>
  </ng-container>
  <ng-container matColumnDef="createdAt">
    <th mat-header-cell *matHeaderCellDef>Utworzono</th>
    <td mat-cell *matCellDef="let element">{{ element.createdAt | date:'dd.MM.yyyy HH:mm:ss' }}</td>
  </ng-container>
  <ng-container matColumnDef="mainImage">
    <th mat-header-cell *matHeaderCellDef>Obrazek</th>
    <td mat-cell *matCellDef="let element">
      <img *ngIf="element.mainImage"
           [src]="'data:image/jpeg;base64,' + element.mainImage"
           alt="photo"
           style="width: 70px; height: 70px; object-fit: cover; border-radius: 5px;">
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="highlightRow(row)"
      [ngClass]="{'highlighted': selectedRowIndex == row.id}"></tr>
</table>
<mat-paginator [pageSize]="pageSize" [pageIndex]="pageIndex" [pageSizeOptions]="[2, 5, 10]"></mat-paginator>
