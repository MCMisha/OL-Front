<section class="calendar">
  <div class="calendar__bg" aria-hidden="true"></div>
  <div class="calendar__vignette" aria-hidden="true"></div>

  <div class="calendar__inner">
    <div class="calendar__month">
      <button class="calendar__arrow" aria-label="Poprzedni miesiąc" (click)="prevMonth()">
        <mat-icon>chevron_left</mat-icon>
      </button>

      <div class="calendar__monthLabel">
        <span class="calendar__monthName">_{{ monthLabel }}</span>
      </div>

      <button class="calendar__arrow" aria-label="Następny miesiąc" (click)="nextMonth()">
        <mat-icon>chevron_right</mat-icon>
      </button>
    </div>

    <div class="calendar__days">
      <div class="days" #calendarPopupRoot #daysWrap>
        <ng-container *ngFor="let d of days">
          <div
            class="days__item"
            #dayEl
            [attr.data-day]="d"
            [class.is-active]="d === activeDay"
            [class.is-disabled]="!daysWithEvents.has(d)"
            (click)="onDayClick(d)"
            role="button"
            [attr.tabindex]="daysWithEvents.has(d) ? 0 : -1"
          >
            <span class="days__num">{{ d }}</span>
            <span class="days__dot" [class.is-visible]="daysWithEvents.has(d)"></span>
          </div>
        </ng-container>

        <ng-container *ngIf="selectedEvents?.length > 0">
          <div
            class="messageCard messageCard--floating"
            [style.left.px]="cardX"
            [style.--caret-left.px]="caretLeft"
          >
            <div class="messageCard__top">
              <div class="messageCard__meta">{{ selectedEvents[0]?.genre ?? 'Spektakl' }}</div>
              <a
                class="messageCard__btn messageCard__btn--primary"
                *ngIf="isSelling(selectedEvents[0])"
                [href]="selectedEvents[0]?.buyLink"
              >
                KUP BILET
              </a>
            </div>

            <div class="messageCard__title">{{ selectedEvents[0]?.title }}</div>

            <div class="messageCard__bottom">
              <button class="messageCard__btn">WIĘCEJ</button>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</section>
