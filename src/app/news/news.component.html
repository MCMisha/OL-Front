<mat-progress-bar class="mb-1" *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>

<section class="news-page">
  <h1 class="news-page__title">AKTUALNOŚCI</h1>

  <div class="news-categories">
    <button
      type="button"
      *ngFor="let category of categoryFilters"
      [class.active]="selectedCategory
      === category.value"
      (click)="selectCategory(category.value)">
      {{ category.label }}
    </button>
  </div>

  <div class="news-layout" *ngIf="news.length">
    <aside class="news-seasons">
      <div class="news-seasons__title">SEZON</div>

      <button
        type="button"
        *ngFor="let season of seasons"
        [class.active]="selectedSeason === season"
        (click)="selectSeason(season)">
        {{ season }}
      </button>
    </aside>

    <main class="news-list">
      <article class="news-item" *ngFor="let n of filteredNews">
        <div class="news-item__date">
          {{ n.creationDate | date:'dd MMMM yyyy' }}
        </div>

        <h2 class="news-item__title">
          {{ n.title }}
        </h2>

        <p class="news-item__subtitle">
          {{ n.subtitle }}
        </p>

        <div class="news-item__bottom">
          <span class="news-item__tag">
            {{ getNewsCategoryLabel(n) | uppercase }}
          </span>

          <a
            class="news-item__link"
            [routerLink]="['/news', n.id]">
            CZYTAJ WIĘCEJ
          </a>
        </div>
      </article>
    </main>
  </div>
</section>
