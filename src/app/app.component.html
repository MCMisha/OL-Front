<div class="public-theme" *ngIf="!isLoading">
  <header class="topbar" *ngIf="showMenu">
    <div class="topbar__inner">
      <div class="topbar__left">
        <button class="icon-btn icon-btn--mobile" type="button" aria-label="Szukaj">
          <mat-icon>search</mat-icon>
        </button>

        <a class="brand brand--desktop" routerLink="/" aria-label="Opera Lubelska - strona główna">
          <img src="assets/logo/logo_white.png" alt="Opera Lubelska" />
        </a>
      </div>

      <div class="topbar__center">
        <nav class="nav nav--desktop" aria-label="Nawigacja">
          <a class="nav__link" routerLink="/performances">Repertuar</a>
          <a class="nav__link" routerLink="/about">O nas</a>
          <a class="nav__link" routerLink="/news">Aktualności</a>
          <a class="nav__link" routerLink="/contact">Kontakt</a>
        </nav>

        <a class="brand brand--mobile" routerLink="/" aria-label="Opera Lubelska - strona główna">
          <img src="assets/logo/logo_white.png" alt="Opera Lubelska" />
        </a>
      </div>

      <div class="topbar__right">
        <a class="partner partner--desktop" href="https://www.lubelskie.pl/" aria-label="Lubelskie">
          <img src="assets/logo/logo_urzad_white.png" alt="Lubelskie" />
        </a>

        <!-- burger / close (mobile only) -->
        <button class="icon-btn icon-btn--mobile" type="button"
                (click)="toggleMobileMenu()" aria-label="Menu">
          <mat-icon>{{ mobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
        </button>
      </div>
    </div>

    <nav class="mobile-dropdown" [class.open]="mobileMenuOpen" aria-label="Menu mobilne">
      <a routerLink="/performances" (click)="navigateFromMenu()">Repertuar</a>
      <a routerLink="/about" (click)="navigateFromMenu()">O nas</a>
      <a routerLink="/news" (click)="navigateFromMenu()">Aktualności</a>
      <a routerLink="/contact" (click)="navigateFromMenu()">Kontakt</a>

      <div class="dropdown-spacer"></div>

      <a class="partner" href="https://www.lubelskie.pl/" aria-label="Lubelskie">
        <img src="assets/logo/logo_urzad_white.png" alt="Lubelskie" />
      </a>
    </nav>
  </header>


  <router-outlet></router-outlet>

  <app-main-footer class="mt-auto"></app-main-footer>
</div>
